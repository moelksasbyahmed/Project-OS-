<style>
        .shimmer {
            background: linear-gradient(90deg, #eff4ff 25%, #d3e4fe 50%, #eff4ff 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .glass-dropdown {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #4648d4 0%, #6063ee 100%);
        }
    </style>

<body class="bg-surface text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-md bg-on-surface/40 backdrop-blur-md" id="modal-overlay">
<!-- Task Details Modal -->
<div class="bg-surface-container-lowest w-full max-w-2xl rounded-xl shadow-2xl border border-outline-variant overflow-hidden transform transition-all duration-300 scale-100" id="task-modal">
<!-- Modal Header -->
<div class="px-lg py-md border-b border-outline-variant flex justify-between items-center">
<div class="flex flex-col">
<h2 class="font-headline-md text-headline-md text-on-surface">Task Details</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">Editing task in Project Alpha</p>
</div>
<button class="p-2 hover:bg-surface-variant rounded-full transition-colors text-on-surface-variant" onclick="closeModal()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content / Form -->
<form class="p-lg space-y-lg max-h-[716px] overflow-y-auto" id="task-form">
<!-- Initial Loading State (Skeleton) -->
<div class="space-y-lg" id="skeleton-loader">
<div class="space-y-2">
<div class="w-24 h-4 shimmer rounded"></div>
<div class="w-full h-12 shimmer rounded-lg"></div>
</div>
<div class="space-y-2">
<div class="w-32 h-4 shimmer rounded"></div>
<div class="w-full h-32 shimmer rounded-lg"></div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-2"><div class="w-20 h-4 shimmer rounded"></div><div class="w-full h-12 shimmer rounded-lg"></div></div>
<div class="space-y-2"><div class="w-20 h-4 shimmer rounded"></div><div class="w-full h-12 shimmer rounded-lg"></div></div>
</div>
</div>
<!-- Real Form Fields (Hidden initially for loading effect) -->
<div class="hidden space-y-lg" id="actual-fields">
<!-- Task Name -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="task-name">Task Name</label>
<input class="w-full px-md py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:border-2 focus:border-primary transition-all text-on-surface" id="task-name" placeholder="Enter task name..." type="text" value="Initial Design System Audit"/>
</div>
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="description">Description</label>
<textarea class="w-full px-md py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:border-2 focus:border-primary transition-all text-on-surface resize-none" id="description" placeholder="Describe the task objectives..." rows="4">Perform a comprehensive review of all current UI components to ensure alignment with the new brand guidelines. Document inconsistencies and propose solutions.</textarea>
</div>
<!-- Grid Controls -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Assignee Selection -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant">Assignee</label>
<div class="relative group">
<button class="w-full flex items-center justify-between px-md py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:border-2 focus:border-primary transition-all text-left" type="button">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-primary-container flex items-center justify-center">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a product designer in a bright, modern studio. High-key lighting, soft shadows, and a clean minimalist background. The style is crisp and corporate with high-resolution details." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJJIe85OyBz8T10-Xd-5OFzAImMad9zAjM7pqv9G2lAxXYJE34ExZIv3O34AK9HeCZEbPl9XMdITnfC3D4hdbYaXmHcI2U7SCDj_S-E8L0CfEAdtFW6e_XNyKfGSkcuoHuP8QlB2qp3WLdWHSNiUKnAGrLc2nQvipErJB2L3Nd2jJTaBJA1woUMpr8Fhz3ltptVBWKTyM1FjNClV2GkIJo5OO6KMLvWciJfGy1MPDWhvHuRboIMt_eFaikbmSKiMZcqLTvm6LIEnI"/>
</div>
<span class="font-body-md text-body-md text-on-surface">Alex Rivera</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</button>
<!-- Simulated Dropdown -->
<div class="hidden group-focus-within:block absolute top-full left-0 w-full mt-2 glass-dropdown border border-outline-variant rounded-xl shadow-lg z-10 p-2">
<div class="flex items-center gap-3 p-2 hover:bg-surface-variant rounded-lg cursor-pointer transition-colors">
<div class="w-8 h-8 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center font-bold">JD</div>
<span class="text-on-surface">Jordan Day</span>
</div>
<div class="flex items-center gap-3 p-2 hover:bg-surface-variant rounded-lg cursor-pointer transition-colors">
<div class="w-8 h-8 rounded-full bg-tertiary-container text-on-tertiary-container flex items-center justify-center font-bold">MK</div>
<span class="text-on-surface">Mia Kang</span>
</div>
</div>
</div>
</div>
<!-- Priority Dropdown -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="priority">Priority</label>
<div class="relative">
<select class="w-full appearance-none px-md py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:border-2 focus:border-primary transition-all text-on-surface cursor-pointer" id="priority">
<option value="low">Low</option>
<option selected="" value="medium">Medium</option>
<option value="high">High</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">unfold_more</span>
</div>
</div>
</div>
</div>
<!-- Due Date -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="due-date">Due Date</label>
<div class="relative">
<input class="w-full px-md py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:border-2 focus:border-primary transition-all text-on-surface" id="due-date" type="date" value="2023-11-24"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
</div>
</div>
</div>
</div>
</form>
<!-- Modal Footer -->
<div class="px-lg py-md bg-surface-container border-t border-outline-variant flex justify-end items-center gap-md">
<button class="px-lg py-2.5 font-label-md text-label-md text-on-surface-variant hover:bg-surface-variant rounded-lg transition-colors border border-outline-variant" onclick="closeModal()" type="button">
                    Cancel
                </button>
<button class="primary-gradient px-xl py-2.5 font-label-md text-label-md text-on-primary rounded-lg shadow-lg hover:brightness-110 active:scale-95 transition-all" form="task-form" type="submit">
                    Save Changes
                </button>
</div>
</div>
</div>
<!-- Background Decoration to show context -->
<div class="fixed inset-0 -z-10 p-xl opacity-30 pointer-events-none">
<div class="grid grid-cols-3 gap-lg">
<div class="h-64 rounded-xl border border-outline-variant border-dashed"></div>
<div class="h-64 rounded-xl border border-outline-variant border-dashed"></div>
<div class="h-64 rounded-xl border border-outline-variant border-dashed"></div>
</div>
</div>
<script>
        // Simulate initial loading state
        window.addEventListener('DOMContentLoaded', () => {
            const skeleton = document.getElementById('skeleton-loader');
            const actual = document.getElementById('actual-fields');
            
            setTimeout(() => {
                skeleton.classList.add('hidden');
                actual.classList.remove('hidden');
                actual.classList.add('animate-in', 'fade-in', 'duration-500');
            }, 1200);
        });

        function closeModal() {
            const modal = document.getElementById('task-modal');
            const overlay = document.getElementById('modal-overlay');
            
            modal.style.transform = 'scale(0.95)';
            modal.style.opacity = '0';
            overlay.style.opacity = '0';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 300);
        }

        // Handle form submission
        document.getElementById('task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check</span> Saved';
                setTimeout(() => {
                    closeModal();
                }, 500);
            }, 1000);
        });

        // Close on backdrop click
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal-overlay')) {
                closeModal();
            }
        });
    </script>
</body></html>
